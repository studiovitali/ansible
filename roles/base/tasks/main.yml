---
- name: Set system timezone
  community.general.timezone:
    # name: "{{ base_timezone }}"
    name: Europe/Zurich
  become: true

- name: Fully upgrade system
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600
  become: true

- name: Install essential system utilities
  ansible.builtin.apt:
    # name: "{{ base_packages }}"
    name:
      - acl
      - curl
      - git
      - htop
      - rsync
      - unzip
      - unattended-upgrades
    state: present
    update_cache: true
  become: true
